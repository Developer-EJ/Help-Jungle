<!doctype html>
<html lang="ko">

    <title>Help_Jungle</title>
</head>

                    </button>
                        <span class="text-sm text-gray-700">
                            <span class="font-semibold">{{ post.nickname }}</span> 님
                        </span>

                        <form action="/auth/logout" method="post">

                </div>

            </div>
        </header>
