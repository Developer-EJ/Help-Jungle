<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-cookie/1.4.1/jquery.cookie.js"></script>

  <title>도와줘요, 정글</title>
</head>

<body class="bg-white flex items-center justify-center min-h-screen">
  <div class="w-full px-6 text-center">
    <header>
      <h1 class="text-[60px] text-black font-extrabold leading-none tracking-tighter">도와줘요</h1>
      <h1 class="text-[90px] text-[#16d764] font-extrabold mt-[-20px]">Jungle</h1>
    </header>

    <div class="space-y-3 mt-6 w-full max-w-sm mx-auto font-bold">
      <div>
        <input id="login_id" type="text" placeholder="아이디"
               class="w-full p-4 bg-gray-200 rounded-md" required>
      </div>
      <div>
        <input id="login_pw" type="password" placeholder="비밀번호"
               class="w-full p-4 bg-gray-200 rounded-md" required>
      </div>
      <button type="button" id="login_btn"
              class="w-full p-4 bg-[#16d764] rounded-md hover:opacity-90">
        로그인
      </button>
    </div>

    <div class="text-center">
      <label for="regist_modal" class="inline-block mt-4 underline cursor-pointer">
        회원가입
      </label>
    </div>
  </div>


  <input id="regist_modal" type="checkbox" class="peer hidden" />


  <div class="fixed inset-0 hidden peer-checked:flex items-center justify-center bg-black/50 px-4">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-lg border">
      <div class="flex items-center justify-between px-5 py-4 border-b">
        <h2 class="font-bold text-lg">회원가입</h2>
        <label for="regist_modal" class="px-5 py-1.5 rounded-lg border text-sm cursor-pointer hover:bg-gray-50">
          닫기
        </label>
      </div>

      <div class="p-5 space-y-4">
        <div>
          <label for="signup_id" class="block text-sm font-medium mb-1">아이디</label>
          <input id="signup_id" type="text" placeholder="아이디를 입력하시오."
                 class="w-full border rounded-lg px-3 py-2" required>
        </div>

        <div>
          <label for="signup_pw" class="block text-sm font-medium mb-1">비밀번호</label>
          <input id="signup_pw" type="password" placeholder="비밀번호를 입력하시오."
                 class="w-full border rounded-lg px-3 py-2" required>
        </div>

        <div>
          <label for="signup_pw2" class="block text-sm font-medium mb-1">비밀번호 확인</label>
          <input id="signup_pw2" type="password" placeholder="비밀번호를 확인하시오."
                 class="w-full border rounded-lg px-3 py-2" required>
        </div>

        <div>
          <label for="signup_nickname" class="block text-sm font-medium mb-1">닉네임</label>
          <input id="signup_nickname" type="text" placeholder="닉네임을 입력하시오."
                 class="w-full border rounded-lg px-3 py-2" required>
        </div>

        <button type="button" id="signup_btn"
                class="w-full bg-black text-white py-2 rounded-lg hover:bg-gray-800">
          회원가입
        </button>
      </div>
    </div>
  </div>

  <script>

    $("#login_btn").click(function() {
      login()
    })

    $("#signup_btn").click(function(){
      signup()
    })

    function login() {
      const id = $("#login_id").val()
      const pw = $("#login_pw").val()

      if(!id || !pw){
        alert("아이디와 비밀번호를 입력하세요")
        return
      }
      $.ajax({
        type:"POST",
        url:"/auth/login",
        data:{id_give:id, pwd_give:pw},
        success:function(response){
        if(response.result == "success"){
          $.cookie("mytoken", response.token)
          alert("로그인 성공")
          window.location.href="/dashboard"
        }
        else {
          alert("로그인 실패")
        }
      }
      }) 
    }

    function signup(){
      const id = $("#signup_id").val()
      const pw = $("#signup_pw").val()
      const pw2 = $("#signup_pw2").val()
      const nickname = $("#signup_nickname").val()

      if(!id || !pw || !pw2 || !nickname) {
        alert("모든 항목을 입력하세요")
        return
      }

      if(pw != pw2){
        alert("비밀번호가 일치하지 않습니다")
        return
      }

      $.ajax({
        type:"POST",
        url:"/auth/signUp",
        data:{
          id_give:id,
          pwd_give:pw,
          pwd2_give:pw2,
          nickname_give:nickname
        }, success:function(response){
          if(response.result == "success"){
            alert("회원가입 완료")
            $("#regist_modal").prop("checked", false)
          }
        }
      })
    }

  </script>

</body>

</html>
