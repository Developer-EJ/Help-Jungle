<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 폰트 삽입 */
  </style>
  <title>도와줘요, 정글</title>
</head>

<body class="bg-white flex items-center justify-center min-h-screen">
  <div class="w-full px-6 text-center">
    <header>
      <h1 class="text-[60px] text-black font-extrabold leading-none tracking-tighter">도와줘요</h1>
      <h1 class="text-[90px] text-[#16d764] font-extrabold mt-[-20px]">Jungle</h1>
    </header>
    <form action="/auth/login" method="post" class="space-y-3 mt-6 w-full max-w-sm mx-auto font-bold">
      <div>
        <input type="text" name="id_give" placeholder="아이디" class="w-full p-4 bg-gray-200 rounded-md" required>
      </div>
      <div>
        <input type="password" name="pwd_give" placeholder="비밀번호" class="w-full p-4 bg-gray-200 rounded-md" required>
      </div>
      <button type="submit" class="w-full p-4 bg-[#16d764] rounded-md">로그인</button>
    </form>

    {% if error %}   
    <p class="text-red-500 text-sm mt-3">로그인에 실패했습니다.</p>
    {% endif %}

    <div class="text-center">
      <label for="regist_modal" class="inline-block mt-4 underline cursor-pointer">
        회원가입
      </label>
    </div>
  </div>

  <input id="regist_modal" type="checkbox" class="peer hidden" />

  <div class="fixed inset-0 hidden peer-checked:flex items-center justify-center bg-black/50 px-4">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-lg border">
      <div class="flex items-center justify-between px-5 py-4 border-b">
        <h2 class="font-bold text-lg">회원가입</h2>
        <label for="regist_modal" class="px-5 py-1.5 rounded-lg border text-sm">
          닫기
        </label>
      </div>

      <div class="p-5">
        <form action="/auth/signUp" method="post" class="space-y-4" onsubmit="return check_pwd()">
          <div>
            <label for="id_give" class="block text-sm font-medium mb-1">아이디</label>
            <input name="id_give" id="id_give" placeholder="아이디를 입력하시오." class="w-full border rounded-lg px-3 py-2"
              required>
          </div>

          <div>
            <label for="pwd_give" class="block text-sm font-medium mb-1">비밀번호</label>
            <input type="password" name="pwd_give" id="pwd_give" placeholder="비밀번호를 입력하시오."
              class="w-full border rounded-lg px-3 py-2" required>
          </div>

          <div>
            <label for="pwd2_give" class="block text-sm font-medium mb-1">비밀번호 확인</label>
            <input type="password" name="pwd2_give" id="pwd2_give" placeholder="비밀번호를 확인하시오."
              class="w-full border rounded-lg px-3 py-2" required>
          </div>

          <div>
            <label class="block text-sm font-medium mb-1">닉네임</label>
            <input name="nickname_give" placeholder="닉네임을 입력하시오." class="w-full border rounded-lg px-3 py-2" required>
          </div>
          {% if signup_error %}
          <p class="text-red-500 text-sm">중복 아이디가 존재합니다.</p>

          {% endif %}
          <button class="w-full bg-black text-white py-2 rounded-lg hover:bg-gray-800">
            회원가입
          </button>
        </form>
      </div>
    </div>
  </div>

  <script>
    function check_pwd() {
      const pwd = document.getElementById("pwd_give").value
      const pwd2 = document.getElementById("pwd2_give").value

      if (pwd != pwd2) {
        alert("비밀번호가 일치하지 않습니다.")
        return false
      }
      return true
    }
  </script>

</body>

</html>
